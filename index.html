<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mickey's Moodle Component Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --yellow: #FDB92A; --black: #000;
      --sb: #111; --sb-hover: #1E1E1E; --sb-active: #252525; --sb-border: #2A2A2A;
      --editor-bg: #1A1A1A; --editor-text: #D4D4D4;
      --ctrl-bg: #141414; --ctrl-border: #2A2A2A;
      --ui: 'Montserrat', Arial, sans-serif;
      --mono: 'JetBrains Mono', 'Courier New', monospace;
    }
    html, body { height: 100%; overflow: hidden; }
    body { display: flex; font-family: var(--ui); background: #0A0A0A; color: #fff; }

    /* LOADING SCREEN */
    #loader {
      position: fixed; inset: 0; background: #0A0A0A; z-index: 999;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
      transition: opacity 0.4s ease;
    }
    #loader.fade-out { opacity: 0; }
    .loader-logo {
      width: 56px; height: 56px; background: var(--yellow); border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 28px; color: #000;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.85; }
    }
    .loader-bar-track {
      width: 220px; height: 3px; background: #222; border-radius: 2px; overflow: hidden;
    }
    .loader-bar-fill {
      height: 100%; background: var(--yellow); border-radius: 2px;
      transition: width 0.2s ease; width: 0%;
    }
    .loader-text {
      font-size: 11px; color: #555; font-family: var(--ui); letter-spacing: 0.5px;
    }

    /* SIDEBAR */
    #sidebar { width: 240px; flex-shrink: 0; background: var(--sb); border-right: 1px solid var(--sb-border); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    #sb-header { padding: 16px 16px 14px; border-bottom: 1px solid var(--sb-border); flex-shrink: 0; }
    .logo-row { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
    .logo-x { width: 22px; height: 22px; background: var(--yellow); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; color: #000; flex-shrink: 0; }
    .logo-name { font-size: 13px; font-weight: 700; }
    .logo-sub { font-size: 9px; color: #555; letter-spacing: 1.2px; text-transform: uppercase; padding-left: 30px; }
    #sb-nav { overflow-y: auto; flex: 1; padding: 8px 0 16px; }
    #sb-nav::-webkit-scrollbar { width: 3px; }
    #sb-nav::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    .nav-group { font-size: 9px; font-weight: 700; letter-spacing: 1.8px; text-transform: uppercase; color: #444; padding: 12px 16px 4px; }
    .nav-item { display: flex; align-items: center; gap: 9px; padding: 7px 16px; cursor: pointer; border-left: 3px solid transparent; font-size: 12px; color: #888; transition: background 0.1s, color 0.1s; }
    .nav-item:hover { background: var(--sb-hover); color: #bbb; }
    .nav-item.active { background: var(--sb-active); border-left-color: var(--yellow); color: #fff; }
    .nav-icon { font-size: 13px; width: 16px; text-align: center; flex-shrink: 0; }

    /* MAIN */
    #main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; min-width: 0; }

    /* TOPBAR */
    #topbar { background: #0D0D0D; border-bottom: 1px solid #222; padding: 0 16px; height: 44px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    #comp-title { font-size: 13px; font-weight: 700; }
    #comp-desc { font-size: 11px; color: #555; margin-left: 10px; }
    .topbar-r { display: flex; gap: 6px; }
    .btn { font-family: var(--ui); font-size: 11px; font-weight: 700; padding: 5px 12px; border-radius: 5px; border: none; cursor: pointer; transition: opacity 0.12s; }
    .btn:hover { opacity: 0.82; }
    .btn-primary { background: var(--yellow); color: #000; }
    .btn-ghost { background: #2A2A2A; color: #aaa; border: 1px solid #3A3A3A; }

    /* CONTROLS */
    #controls-panel { background: var(--ctrl-bg); border-bottom: 1px solid var(--ctrl-border); flex-shrink: 0; display: none; flex-direction: column; max-height: 250px; overflow-y: auto; }
    #controls-panel::-webkit-scrollbar { width: 4px; }
    #controls-panel::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    .ctrl-header { display: flex; align-items: center; justify-content: space-between; padding: 7px 14px; border-bottom: 1px solid #1E1E1E; flex-shrink: 0; background: #0D0D0D; position: sticky; top: 0; z-index: 2; }
    .ctrl-label { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #555; }
    .ctrl-actions { display: flex; align-items: center; gap: 6px; }
    .ctrl-btn { font-family: var(--ui); font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 4px; border: none; cursor: pointer; }
    .ctrl-btn-add { background: #1A2A1A; color: #90EE90; border: 1px solid #2A4A2A; }
    .ctrl-btn-action { background: #1A1A2E; color: #8888FF; border: 1px solid #2A2A4A; }
    .ctrl-btn-x { background: none; border: none; color: #555; cursor: pointer; font-size: 15px; padding: 0 4px; line-height: 1; font-family: var(--ui); }
    .ctrl-btn-x:hover { color: #FF6B6B; }
    .ctrl-total { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 4px; font-family: var(--ui); }
    .ctrl-rows { padding: 3px 0 6px; }
    .ctrl-col-hdr { font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #444; }
    .ctrl-row { display: flex; align-items: center; gap: 6px; padding: 4px 14px; }
    .ctrl-num { width: 16px; font-size: 10px; color: #555; text-align: right; flex-shrink: 0; font-family: var(--mono); }
    .ci { font-family: var(--ui); font-size: 12px; background: #222; border: 1px solid #333; border-radius: 4px; color: #ccc; padding: 4px 7px; outline: none; }
    .ci:focus { border-color: #FDB92A66; }
    .ci-sm { width: 52px; flex-shrink: 0; }
    .ci-year { width: 64px; flex-shrink: 0; }
    .ci-grow { flex: 1; min-width: 0; }
    .ci-med { flex: 2; min-width: 0; }
    .ci-wide { flex: 3; min-width: 0; }

    /* PREVIEW */
    #preview-panel { flex: 1; overflow: hidden; background: #EFEFEF; position: relative; min-height: 0; }
    #preview-label { position: absolute; top: 8px; left: 12px; font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #999; background: #E5E5E5; z-index: 1; padding: 2px 6px; border-radius: 3px; }
    #preview-frame { width: 100%; height: 100%; border: none; display: none; }
    #welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 10px; }
    .w-x { width: 48px; height: 48px; background: #1A1A1A; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 700; color: var(--yellow); margin-bottom: 4px; }
    #welcome h2 { font-size: 14px; color: #666; font-weight: 600; }
    #welcome p { font-size: 12px; color: #555; text-align: center; max-width: 240px; line-height: 1.6; }

    /* EDITOR */
    #resize-handle { height: 5px; background: #111; border-top: 1px solid #222; cursor: row-resize; flex-shrink: 0; }
    #resize-handle:hover { background: #FDB92A22; }
    #editor-panel { height: 270px; flex-shrink: 0; display: none; flex-direction: column; background: var(--editor-bg); }
    #editor-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 0 14px; height: 32px; border-bottom: 1px solid #2A2A2A; flex-shrink: 0; }
    .ed-label { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #444; }
    .live-dot { font-size: 10px; color: #3A9A3A; font-weight: 700; }
    #code-editor { flex: 1; font-family: var(--mono); font-size: 11.5px; line-height: 1.6; color: var(--editor-text); background: var(--editor-bg); border: none; resize: none; padding: 10px 14px; outline: none; tab-size: 2; }

    /* FEEDBACK */
    .toast { position: fixed; bottom: 280px; right: 16px; background: #1A3A1A; color: #90EE90; font-size: 11px; font-weight: 700; padding: 7px 14px; border-radius: 5px; opacity: 0; transform: translateY(6px); transition: opacity 0.18s, transform 0.18s; pointer-events: none; z-index: 100; }
    .toast.show { opacity: 1; transform: none; }
  </style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loader">
  <div class="loader-logo">M</div>
  <div class="loader-bar-track"><div class="loader-bar-fill" id="loader-bar"></div></div>
  <div class="loader-text" id="loader-text">Loading…</div>
</div>

<nav id="sidebar">
  <div id="sb-header">
    <div class="logo-row"><div class="logo-x">M</div><span class="logo-name">Mickey's Library</span></div>
    <div class="logo-sub">Moodle Component Library</div>
  </div>
  <div id="sb-nav"></div>
</nav>

<div id="main">
  <div id="topbar">
    <div style="display:flex;align-items:center">
      <span id="comp-title" style="font-size:13px;font-weight:700">Select a component</span>
      <span id="comp-desc" style="font-size:11px;color:#555;margin-left:10px"></span>
    </div>
    <div class="topbar-r">
      <button class="btn btn-ghost" id="btn-reset" onclick="resetComp()" style="display:none">↺ Reset</button>
      <button class="btn btn-primary" id="btn-copy" onclick="copyCode()" style="display:none">Copy HTML</button>
    </div>
  </div>

  <div id="controls-panel"></div>

  <div id="preview-panel">
    <div id="preview-label">PREVIEW</div>
    <iframe id="preview-frame" title="Component preview"></iframe>
    <div id="welcome">
      <div class="w-x">M</div>
      <h2>Mickey's Moodle Components</h2>
      <p>Pick a component from the sidebar to preview, edit, and copy it into Moodle.</p>
    </div>
  </div>

  <div id="resize-handle"></div>
  <div id="editor-panel">
    <div id="editor-toolbar">
      <span class="ed-label">HTML Source</span>
      <span class="live-dot">● LIVE</span>
    </div>
    <textarea id="code-editor" spellcheck="false" autocomplete="off"></textarea>
  </div>
</div>

<div class="toast" id="toast">✓ Copied to clipboard</div>

<script>
// ── Helpers ──
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const escA = s => String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const clone = o => JSON.parse(JSON.stringify(o));
const OPEN = `<!DOCTYPE html><html><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet"><style>body{margin:0;padding:24px;background:#fff;font-family:'Montserrat',Arial,sans-serif;}*{box-sizing:border-box;}</style></head><body>`;
const CLOSE = `</body></html>`;

// ── YouTube Helpers ──
function ytExtractUrl(input) {
  if (!input) return '';
  const srcMatch = input.match(/src=["']([^"']+)["']/);
  return srcMatch ? srcMatch[1] : input;
}
function ytVideoId(input) {
  const url = ytExtractUrl(input);
  if (!url) return '';
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?(?:.*&)?v=|embed\/|v\/|shorts\/))([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : '';
}
function ytPlaylistId(input) {
  const url = ytExtractUrl(input);
  if (!url) return '';
  const m = url.match(/[?&]list=([a-zA-Z0-9_-]+)/);
  return m ? m[1] : '';
}
function ytThumb(vid) {
  return vid
    ? `https://img.youtube.com/vi/${vid}/mqdefault.jpg`
    : `https://placehold.co/400x225/000000/FDB92A/png?text=Paste+URL`;
}
function ytIdBadge(id, label) {
  if (!id) return `<span style="font-size:10px;color:#555;font-family:var(--ui)">— paste a URL above</span>`;
  return `<span style="font-size:10px;font-family:var(--mono);background:#1A2A1A;color:#90EE90;padding:2px 7px;border-radius:3px">${label}: ${id}</span>`;
}

// ── Registry ──
const C = {};
function register(def) {
  C[def.id] = def;
}

// ── Group order ──
const GROUP_ORDER = ['Layout','Callouts','Cards','Lists','Teaching','Course Info','Timeline','Media'];

function buildSidebar() {
  const nav = document.getElementById('sb-nav');
  nav.innerHTML = '';
  const groups = {};
  for (const id in C) {
    const def = C[id];
    const g = def.group || 'Other';
    if (!groups[g]) groups[g] = [];
    groups[g].push(def);
  }
  const order = [...GROUP_ORDER];
  for (const g in groups) { if (!order.includes(g)) order.push(g); }
  for (const g of order) {
    if (!groups[g]) continue;
    const hdr = document.createElement('div');
    hdr.className = 'nav-group';
    hdr.textContent = g;
    nav.appendChild(hdr);
    for (const def of groups[g]) {
      const item = document.createElement('div');
      item.className = 'nav-item';
      item.dataset.id = def.id;
      item.innerHTML = `<span class="nav-icon">${def.icon || ''}</span>${def.name}`;
      item.addEventListener('click', () => load(def.id));
      nav.appendChild(item);
    }
  }
}

// ── Engine ──
const states = {};
let cur = null;

function getState(id) {
  if (!states[id]) states[id] = clone(C[id].def);
  return states[id];
}

function load(id) {
  cur = id;
  const comp = C[id];
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const nav = document.querySelector(`.nav-item[data-id="${id}"]`);
  if (nav) { nav.classList.add('active'); nav.scrollIntoView({block:'nearest'}); }
  document.getElementById('comp-title').textContent = comp.name;
  document.getElementById('comp-desc').textContent = '— ' + comp.desc;
  document.getElementById('btn-copy').style.display = '';
  document.getElementById('btn-reset').style.display = '';
  document.getElementById('editor-panel').style.display = 'flex';
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('preview-frame').style.display = 'block';
  const cp = document.getElementById('controls-panel');
  if (comp.code !== undefined) {
    cp.style.display = 'none';
    setEditor(comp.code);
  } else {
    cp.style.display = 'flex'; cp.style.flexDirection = 'column';
    cp.innerHTML = comp.ctrl(getState(id));
    const code = comp.gen(getState(id));
    const preview = comp.preview ? comp.preview(getState(id)) : code;
    setEditor(code, preview);
  }
}

function setEditor(code, previewCode) {
  document.getElementById('code-editor').value = code;
  renderPreview(previewCode || code);
}

let _blobUrl = null;
function renderPreview(code) {
  const frame = document.getElementById('preview-frame');
  if (_blobUrl) { URL.revokeObjectURL(_blobUrl); _blobUrl = null; }
  const blob = new Blob([OPEN + code + CLOSE], {type: 'text/html'});
  _blobUrl = URL.createObjectURL(blob);
  frame.src = _blobUrl;
}

function regen() {
  if (!cur || C[cur].code !== undefined) return;
  const st = getState(cur);
  document.getElementById('controls-panel').innerHTML = C[cur].ctrl(st);
  const code = C[cur].gen(st);
  const preview = C[cur].preview ? C[cur].preview(st) : code;
  setEditor(code, preview);
}

// Controls input
document.getElementById('controls-panel').addEventListener('input', e => {
  if (!cur || C[cur].code !== undefined) return;
  const el = e.target;
  const f = el.dataset.f;
  const i = parseInt(el.dataset.i);
  const st = getState(cur);
  const comp = C[cur];

  if (comp.onInput) {
    const needsRegen = comp.onInput(st, f, i, el);
    if (needsRegen === true) { regen(); return; }
  }

  // Update preview + code without full regen (preserves focus)
  const code = comp.gen(st);
  document.getElementById('code-editor').value = code;
  renderPreview(code);

  // Special post-input hook for grade-breakdown weight pill
  if (cur === 'grade-breakdown' && f === 'weight') {
    const t = st.rows.reduce((s,r) => s + Number(r.weight), 0);
    const pill = document.querySelector('.ctrl-total');
    if (pill) {
      const ok = t === 100;
      pill.textContent = `Total: ${t}%`;
      pill.style.background = ok ? '#1A3A1A' : '#3A1A1A';
      pill.style.color = ok ? '#90EE90' : '#FF9999';
    }
  }
});

// Controls button clicks
document.getElementById('controls-panel').addEventListener('click', e => {
  if (!cur || C[cur].code !== undefined) return;
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const act = btn.dataset.action;
  const i = parseInt(btn.dataset.i);
  const st = getState(cur);
  const comp = C[cur];
  if (comp.onClick) comp.onClick(st, act, i);
  regen();
});

// Editor manual typing
document.getElementById('code-editor').addEventListener('input', function() { renderPreview(this.value); });

// Tab key
document.getElementById('code-editor').addEventListener('keydown', function(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = this.selectionStart;
    this.value = this.value.substring(0, s) + '  ' + this.value.substring(this.selectionEnd);
    this.selectionStart = this.selectionEnd = s + 2;
    renderPreview(this.value);
  }
});

// Copy
function copyCode() {
  navigator.clipboard.writeText(document.getElementById('code-editor').value).then(() => {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  });
}

// Reset
function resetComp() {
  if (!cur) return;
  if (C[cur].code !== undefined) { setEditor(C[cur].code); }
  else { states[cur] = clone(C[cur].def); regen(); }
}

// Resize
const rh = document.getElementById('resize-handle'), ep = document.getElementById('editor-panel');
let rs = false, sy = 0, sh = 0;
rh.addEventListener('mousedown', e => { rs = true; sy = e.clientY; sh = ep.offsetHeight; document.body.style.cursor = 'row-resize'; document.body.style.userSelect = 'none'; });
document.addEventListener('mousemove', e => { if (!rs) return; ep.style.height = Math.max(80, Math.min(600, sh + sy - e.clientY)) + 'px'; });
document.addEventListener('mouseup', () => { if (rs) { rs = false; document.body.style.cursor = ''; document.body.style.userSelect = ''; } });

// ── Component loader ──
async function loadComponents() {
  const loaderBar = document.getElementById('loader-bar');
  const loaderText = document.getElementById('loader-text');
  const loader = document.getElementById('loader');

  let ids;
  try {
    const res = await fetch('components/manifest.json');
    ids = await res.json();
  } catch(e) {
    loaderText.textContent = 'Failed to load manifest';
    return;
  }

  const total = ids.length;
  loaderText.textContent = `Loading 0 / ${total}`;

  for (let idx = 0; idx < ids.length; idx++) {
    const id = ids[idx];
    try {
      const res = await fetch(`components/${id}.js`);
      const text = await res.text();
      new Function('register','esc','escA','ytVideoId','ytPlaylistId','ytThumb','ytIdBadge', text)(
        register, esc, escA, ytVideoId, ytPlaylistId, ytThumb, ytIdBadge
      );
    } catch(e) {
      console.warn(`Failed to load component: ${id}`, e);
    }
    const loaded = idx + 1;
    loaderBar.style.width = `${(loaded / total) * 100}%`;
    loaderText.textContent = `Loading ${loaded} / ${total}`;
  }

  buildSidebar();

  loader.classList.add('fade-out');
  setTimeout(() => { loader.style.display = 'none'; }, 420);
}

loadComponents();
</script>
</body>
</html>
